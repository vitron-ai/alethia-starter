name: alethia

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: alethia-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run Alethia NLP tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out starter
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libgtk-3-0 \
            libxshmfence1 libnotify4 libsecret-1-0 libnspr4

      - name: Install Alethia
        run: |
          npm install -g @vitronai/alethia@latest
          alethia-mcp --version

      - name: Serve Atlas on :5173
        run: |
          python3 -m http.server 5173 >/tmp/atlas-server.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5173 >/dev/null; then
              echo "Atlas is up."
              exit 0
            fi
            sleep 0.25
          done
          echo "Atlas failed to start" >&2
          exit 1

      - name: Preflight
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
          ALETHIA_DEBUG: '1'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            alethia-mcp --health-check || true
          ls -la ~/.alethia/runtime/ 2>/dev/null || echo "(runtime dir not created)"

      - name: Run NLP tests
        env:
          ALETHIA_TARGET: http://127.0.0.1:5173
          ALETHIA_BRIDGE: alethia-mcp
          ALETHIA_DEBUG: '1'
          ELECTRON_DISABLE_SANDBOX: '1'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            node __alethia__/ci-runner.mjs

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: alethia-logs
          path: |
            /tmp/atlas-server.log
            ~/.alethia/logs/**
          if-no-files-found: ignore
          retention-days: 7

  benchmark:
    name: Benchmark — Alethia vs Playwright
    runs-on: ubuntu-latest
    needs: e2e
    timeout-minutes: 20

    steps:
      - name: Check out starter
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libgtk-3-0 \
            libxshmfence1 libnotify4 libsecret-1-0 libnspr4

      - name: Install Alethia
        run: |
          npm install -g @vitronai/alethia@latest
          alethia-mcp --version

      - name: Install Playwright
        working-directory: benchmark
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Serve Atlas on :5173
        run: |
          python3 -m http.server 5173 >/tmp/atlas-server.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5173 >/dev/null; then
              echo "Atlas is up."
              exit 0
            fi
            sleep 0.25
          done
          echo "Atlas failed to start" >&2
          exit 1

      - name: Run benchmark
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
          ALETHIA_BRIDGE: alethia-mcp
          # Match Playwright's headless default for a clean apples-to-apples
          # comparison. Both frameworks run with no visible UI.
          ALETHIA_HEADLESS: '1'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            node benchmark/compare.mjs --iterations 10

      - name: Render summary
        if: always()
        run: |
          if [ -f benchmark/results.json ]; then
            echo "## Benchmark — Alethia vs Playwright" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "How long each framework takes to run a single test flow in an agent workflow. Lower is better." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '| Flow | Alethia | Playwright | Alethia is |' >> "$GITHUB_STEP_SUMMARY"
            echo '|---|---|---|---|' >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const fmt = (ms) => ms >= 1000 ? (ms/1000).toFixed(2) + 's' : Math.round(ms) + 'ms';
              const r = JSON.parse(require('fs').readFileSync('benchmark/results.json','utf8'));
              for (const [flow, v] of Object.entries(r.flows)) {
                console.log(\`| \${flow} | \${fmt(v.alethia.subseq.meanMs)} | \${fmt(v.playwright.meanMs)} | **\${v.speedup.toFixed(1)}× faster** |\`);
              }
            " >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Full per-iteration stats (p50, p95, min, max) in the \`benchmark-results\` artifact below." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark/results.json
          if-no-files-found: warn
          retention-days: 30
