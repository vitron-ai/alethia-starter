name: alethia

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: alethia-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run Alethia NLP tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out starter
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps for Electron + xvfb
        run: |
          sudo apt-get update
          # Electron's Linux deps on ubuntu-24.04. libasound2t64 is the
          # renamed libasound2 as of Noble. libgbm1, libxkbcommon0, and
          # libxshmfence1 are load-bearing for Chromium GPU process init
          # even under xvfb. libnotify4 + libsecret-1-0 satisfy the
          # notification + keyring stubs Electron expects.
          sudo apt-get install -y \
            xvfb \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libgtk-3-0 \
            libxshmfence1 libnotify4 libsecret-1-0 libnspr4

      - name: Pre-install pinned Alethia bridge
        # Pin to the current minimum-safe bridge version rather than relying
        # on npx resolution at test time. Prevents a stale cache from
        # picking up a deprecated bridge that points at a yanked runtime.
        run: |
          npm install -g @vitronai/alethia@^0.3.27
          alethia-mcp --version

      - name: Serve Atlas on :5173
        run: |
          python3 -m http.server 5173 >/tmp/atlas-server.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5173 >/dev/null; then
              echo "Atlas is up."
              exit 0
            fi
            sleep 0.25
          done
          echo "Atlas failed to start" >&2
          cat /tmp/atlas-server.log >&2
          exit 1

      - name: Preflight — start Alethia runtime under xvfb
        # The bridge auto-spawns the runtime the first time a tool call
        # needs it, but on ubuntu-latest the Chromium sandbox can't setuid
        # as the non-root `runner` user and silently fails. Exercise the
        # bridge's --health-check path first: it runs ensureRuntime() plus
        # a tools/list probe and prints verbose diagnostics. If this
        # succeeds, the next step's bridge spawn will find a ready runtime.
        env:
          ELECTRON_DISABLE_SANDBOX: '1'
          ALETHIA_DEBUG: '1'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            alethia-mcp --health-check || true
          echo "--- ~/.alethia tree ---"
          ls -la ~/.alethia/runtime/ 2>/dev/null || echo "(runtime dir not created)"

      - name: Run Alethia NLP tests under xvfb
        env:
          ALETHIA_TARGET: http://127.0.0.1:5173
          # Use the pinned bridge we just installed instead of resolving
          # @vitronai/alethia via npx (which can hit a stale cache).
          ALETHIA_BRIDGE: alethia-mcp
          # Surface bridge diagnostics in the CI log when tests misbehave.
          ALETHIA_DEBUG: '1'
          # Chromium sandbox can't setuid as `runner` in GitHub-hosted
          # ubuntu runners. This env var makes Electron skip the sandbox
          # (in addition to any --no-sandbox argv the runtime passes).
          ELECTRON_DISABLE_SANDBOX: '1'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            node __alethia__/ci-runner.mjs

      - name: Upload Alethia logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: alethia-logs
          path: |
            /tmp/atlas-server.log
            ~/.alethia/logs/**
          if-no-files-found: ignore
          retention-days: 7
